<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="container container-wide">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>👥 Visitas Registradas</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="inputBuscar" placeholder="Código estudiante..." style="width: 150px;">
                    <button class="btn-primary" style="width: auto; padding: 8px 15px;">Buscar</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre Completo</th>
                        <th>Motivo</th>
                        <th>Fecha y Hora</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla_cuerpo">
                    </tbody>
            </table>

            <div style="display: flex; gap: 20px; margin-top: 30px;">
                <div class="card" style="flex: 1; padding: 15px; background: #f0f4ff;">
                    <small>Total Visitas</small>
                    <h3 id="countTotal">0</h3>
                </div>
                <div class="card" style="flex: 1; padding: 15px; background: #fff9db;">
                    <small>Pendientes</small>
                    <h3 id="countPendientes">0</h3>
                </div>
                <div class="card" style="flex: 1; padding: 15px; background: #e6fcf5;">
                    <small>Completadas</small>
                    <h3 id="countCompletadas">0</h3>
                </div>
            </div>
        </div>
        <br>
        <a href="index.html" style="color: #666; text-decoration: none; font-size: 0.8rem;">← Volver al Inicio</a>
    </div>

    <script>
        // Variable global para mantener los datos cargados y no leer el disco a cada rato
    let todasLasVisitas = [];

function cargarVisitas() {
    const datosEnStorage = localStorage.getItem('misVisitas');
    todasLasVisitas = datosEnStorage ? JSON.parse(datosEnStorage) : [];
    
    // Al cargar inicialmente, mostramos todo
    renderizarTabla(todasLasVisitas);
    actualizarMetricas(todasLasVisitas);
}

// Función dedicada a dibujar la tabla
function renderizarTabla(lista) {
    const tabla = document.getElementById('tabla_cuerpo');
    tabla.innerHTML = "";

    if (lista.length === 0) {
        tabla.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No se encontraron resultados</td></tr>";
        return;
    }

    lista.forEach((v) => {
        const fila = `
            <tr>
                <td>${v.codigo}</td>
                <td>${v.nombre} ${v.apellidos}</td>
                <td>${v.motivo}</td>
                <td>${v.fecha}</td>
                <td><span class="status ${v.estado.toLowerCase()}">${v.estado}</span></td>
            </tr>
        `;
        tabla.innerHTML += fila;
    });
}

// LÓGICA DEL BUSCADOR EN TIEMPO REAL
const inputBuscar = document.getElementById('inputBuscar');

inputBuscar.addEventListener('input', (e) => {
    const terminoBusqueda = e.target.value.toLowerCase();

    // Filtramos la lista global
    const resultadosFiltrados = todasLasVisitas.filter(v => {
        // Buscamos coincidencia en código O en nombre completo
        const nombreCompleto = `${v.nombre} ${v.apellidos}`.toLowerCase();
        return v.codigo.toLowerCase().includes(terminoBusqueda) || 
               nombreCompleto.includes(terminoBusqueda);
    });

    // Volvemos a dibujar solo lo filtrado
    renderizarTabla(resultadosFiltrados);
});

function actualizarMetricas(visitas) {
    const total = visitas.length;
    const pendientes = visitas.filter(v => v.estado.toLowerCase() === 'pendiente').length;
    const completadas = total - pendientes;

    document.getElementById('countTotal').innerText = total;
    document.getElementById('countPendientes').innerText = pendientes;
    document.getElementById('countCompletadas').innerText = completadas;
}

document.addEventListener('DOMContentLoaded', cargarVisitas);
    </script>
</body>
</html>
